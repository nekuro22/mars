<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Mars-Terraforming</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/+esm"></script>
</head>
<body>
    <main class="info-shell">
        <div class="info-content" id="content">
            <!-- Markdown content will be loaded here -->
        </div>
    </main>
    <div class="ai-notice">3D-Modell KI-generiert &middot; nur zur Visualisierung &middot; <a href="https://leidert.org/info/impressum/">Impressum</a></div>

    <script type="module">
        import { marked } from 'https://cdn.jsdelivr.net/npm/marked@11.1.1/+esm';

        fetch('https://raw.githubusercontent.com/nekuro22/leidert.org/refs/heads/main/mars/infos.md')
            .then(response => response.text())
            .then(markdown => {
                const html = marked(markdown);
                const contentDiv = document.getElementById('content');
                contentDiv.innerHTML = html;
                
                // Add back-link and kahoot link after content
                const backLinkDiv = document.createElement('div');
                backLinkDiv.className = 'back-link';
                backLinkDiv.innerHTML = `
                    <a href="https://example.com">Hier kommt noch ein Kahoot</a>
                    <a href="index.html">&larr; Zurück zur Simulation</a>
                    <a href="ai-info.html">&rarr; KI-Info</a>
                    <a href="https://nekuro22.github.io/mars">Fallback</a>
                `;
                contentDiv.appendChild(backLinkDiv);
            })
            .catch(error => {
                console.error('Error loading markdown:', error);
                document.getElementById('content').innerHTML = '<p>Fehler beim Laden des Inhalts.</p>';
            });
    </script>
</body>
</html>
