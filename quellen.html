<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quellen</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/+esm"></script>
</head>
<body class="quellen">
    <main class="info-shell">
        <div class="info-content" id="content">
            <!-- Markdown content will be loaded here -->
        </div>
    </main>

    <script type="module">
        import { marked } from 'https://cdn.jsdelivr.net/npm/marked@11.1.1/+esm';

        fetch('https://raw.githubusercontent.com/nekuro22/leidert.org/refs/heads/main/mars/quellen.md')
            .then(response => response.text())
            .then(markdown => {
                const html = marked(markdown);
                const contentDiv = document.getElementById('content');
                contentDiv.innerHTML = html;

                const backLinkDiv = document.createElement('div');
                backLinkDiv.className = 'back-link';
                backLinkDiv.style.padding = '0 clamp(24px, 4vw, 48px) 2rem';
                backLinkDiv.innerHTML = `
                    <a href="index.html">&larr; Zurück zur Simulation</a>
                    <a href="infos.html">&rarr; Info</a>
                    <a href="ai-info.html">&rarr; KI-Info</a>
                `;
                contentDiv.appendChild(backLinkDiv);
            })
            .catch(error => {
                console.error('Error loading markdown:', error);
                document.getElementById('content').innerHTML = '<p>Fehler beim Laden des Inhalts.</p>';
            });
    </script>
</body>
</html>
